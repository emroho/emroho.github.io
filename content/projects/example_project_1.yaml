title: "Chronic Kidney Disease Prediction"

short_summary: >
  Identified the leading contributing factors of chronic kidney disease using machine learning models.

tech_stack:
  - Python
  - scikit-learn
  - pandas
  - matplotlib
  - Jupyter Notebooks

problem_statement: >
  About 14% of U.S. adults are affected by Chronic Kidney Disease (CKD). 
  That makes up 35.5 million people. Despite the high number, approximately 90% of the people with CKD are not aware they have it. 
  We aim to find which measurable health variables are linked closest to the disease in order to increase early detection and prevention.


approach: >
  Collected location data across 47 candidate nap sites over a full
  academic semester. Features included average daily sunlight (hours),
  grass softness score (1–10, assessed manually), nearby food-cart
  proximity, and pedestrian traffic by hour. Trained a gradient boosting
  classifier to predict a site's "nap quality" rating and used SHAP
  values to explain which features mattered most.

results_impact: >
  The model achieved 89% accuracy on held-out test sites. Sunlight
  duration and grass softness were the top two predictive features,
  while proximity to the student union food court provided a meaningful
  but secondary boost. A ranked list of top-10 nap sites was distributed
  to the campus dog community and has since been downloaded 847 times.

repo_url: "https://github.com/emroho/ChronicKidneyDisease"
notebook_url: "https://github.com/zeke-wonder-dog/nap-spot-predictor/blob/main/analysis.ipynb"
