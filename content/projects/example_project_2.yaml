title: "Plant Growth Analysis"

short_summary: >
  Used predictive modeling to identify which environmental stressors 
  have the greatest impact on tropical plant growth.

tech_stack:
  - Python
  - pandas
  - seaborn
  - sklearn
  - statsmodels
  - Jupyter Notebooks

problem_statement: >
  Tropical ecosystems play an extremely important role as a biodiversity hub, 
  a carbon sink for 25% of the world's carbon, and a source of rain for areas around 
  the globe. However, increased global temperatures and pollution from the 
  climate crisis have increased the multitude of stressors on plants, especially 
  in lower latitudes. Tropical plants in these biomes therefore are more at risk, 
  and our project attempts to answer the question: "Can we predict the effect of 
  stressors on plant growth?"

approach: >
  We created an SVR model using the harvest time, herbivory, and plant death gravimetric water content (PDGWC) to predict the ratio of root-to-shoot biomass in order to predict the necessary conditions for viable plant growth. A ratio of root to shoot was chosen so we can understand where a plant diverts its energy—to root growth to stabilize itself and recover, or to shoot growth for reproduction and photosynthesis when it can thrive. 

results_impact: >
  Altogether, we've found that we can predict the effect of stressors on plant growth using a root/shoot ratio, and the water content, harvest time, and herbivory of the tropical plant. With the limitations our data showed, such as a low amount of predictors and not many points for a single species, our model still was quite accurate in predicting the outcome. This can be applied to understand conditions necessary for these tropical plants further in order to conserve these important environments.

repo_url: "https://github.com/emroho/PlantGrowthStressors"
notebook_url: "https://github.com/emroho/PlantGrowthStressors/blob/main/notebook/Final.ipynb"
