title: "Plant Growth Analysis"

short_summary: >
  Used predictive modeling to identify which environmental stressors 
  have the greatest impact on tropical plant growth.

tech_stack:
  - Python
  - pandas
  - seaborn
  - sklearn
  - statsmodels
  - Jupyter Notebooks

problem_statement: >
  Tropical ecosystems play an extremely important role as a biodiversity hub, 
  a carbon sink for 25% of the world's carbon, and a source of rain for areas around 
  the globe. However, increased global temperatures and pollution from the 
  climate crisis have increased the multitude of stressors on plants, especially 
  in lower latitudes. Tropical plants in these biomes therefore are more at risk, 
  and our project attempts to answer the question: "Can we predict the effect of 
  stressors on plant growth?"

approach: >
  Combined play-by-play game data with decibel readings from stadium
  microphones across three seasons (~36 home games). Engineered features
  for score differential, down-and-distance, quarter, temperature, and
  opponent rank. Produced interactive Plotly dashboards that let
  non-technical staff filter by season and event type to explore crowd
  response patterns on their own.

results_impact: >
  Defensive turnovers produced the loudest average crowd response —
  louder even than touchdowns — especially when MSU was trailing.
  Walk-up music selections in the 3rd quarter showed a statistically
  significant effect on cheer volume for games decided by fewer than
  10 points. The athletics team used these findings to redesign the
  third-quarter entertainment package for the following season. I was
  given extra treats for my contributions.

repo_url: "https://github.com/zeke-wonder-dog/spartan-cheer-analysis"
notebook_url: "https://github.com/zeke-wonder-dog/spartan-cheer-analysis/blob/main/cheer_analysis.ipynb"
